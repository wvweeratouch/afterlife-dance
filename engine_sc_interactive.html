// ============================================================
// PLAY — per-synth gain compensation
// ============================================================
const SYNTH_GAIN={
  'sonic-pi-supersaw':0.35,'sonic-pi-tech_saws':0.5,'sonic-pi-prophet':0.5,
  'sonic-pi-hoover':0.55,'sonic-pi-blade':0.6,'sonic-pi-dsaw':0.6,
  'sonic-pi-dark_ambience':1.8,'sonic-pi-hollow':2.0,'sonic-pi-dull_bell':1.1,
  'sonic-pi-pretty_bell':1.0,'sonic-pi-pluck':1.2,'sonic-pi-kalimba':1.1,
  'sonic-pi-piano':1.0,'sonic-pi-rhodey':0.9,'sonic-pi-fm':0.8,
  'sonic-pi-zawa':1.3,'sonic-pi-mod_sine':1.4,'sonic-pi-mod_fm':0.9,
  'sonic-pi-recorder':1.1,'sonic-pi-dtri':1.2,'sonic-pi-beep':1.0,
  'sonic-pi-tb303':0.7,'sonic-pi-growl':0.8,'sonic-pi-bass_foundation':0.9,
  'sonic-pi-organ_tonewheel':0.8,'sonic-pi-noise':1.0,'sonic-pi-saw':0.7,
};
function synthGain(s){return SYNTH_GAIN[s]||1.0;}
function nid(){return nodeId++}
function play(synth,note,dur,p={}){
  if(!sonic||!started)return;
  const id=nid();
  const amp=(p.amp||0.3)*volScale*synthGain(synth);
  const args=['note',note,'sustain',dur,'amp',amp];
  if(p.cutoff)args.push('cutoff',p.cutoff);
  if(p.release!=null)args.push('release',p.release);
  if(p.attack!=null)args.push('attack',p.attack);
  if(p.pan!=null)args.push('pan',p.pan);
  if(p.res)args.push('res',p.res);
  sonic.send('/s_new',synth,id,0,0,...args);
}
function playBg(synth,note,dur,p={}){play(synth,note,dur,{...p,amp:(p.amp||0.3)*bgScale});}
function playMelA(synth,note,dur,p={}){play(synth,note,dur,{...p,amp:(p.amp||0.3)*melScale*melAScale});}
function playMelB(synth,note,dur,p={}){play(synth,note,dur,{...p,amp:(p.amp||0.3)*melScale*melBScale});}
function playMel(synth,note,dur,p={}){play(synth,note,dur,{...p,amp:(p.amp||0.3)*melScale});}
// Auto-melody: scaled by autoMelScale, routed through melA
function playAutoMel(synth,note,dur,p={}){
  if(!G.autoMel&&!bodyDetected)return;
  const sc=bodyDetected?Math.max(0.15,1-autoMelScale):autoMelScale;
  play(synth,note,dur,{...p,amp:(p.amp||0.3)*melScale*melAScale*sc});
}
// Auto-melody B line: routed through melB

  const sc=bodyDetected?Math.max(0.15,1-autoMelScale):autoMelScale;

}

// ============================================================
// WALKER
// ============================================================
let ci=0,mP=2,mD=1,m2P=4,m2D=-1,mBP=3,mBD=-1;
function walk(p,d,sc,restP=0){
  if(!sc||!sc.length)return[0,1,false];
  if(Math.random()<restP)return[p,d,false];
  const old=p;
  for(let i=0;i<6;i++){
    let np=p,nd=d;const r=Math.random();
    if(r<.35)np+=nd;else if(r<.55)np+=nd*2;else if(r<.7){nd*=-1;np+=nd;}
    else if(r<.85)np+=Math.round(Math.random()*2)-1;
    else np=Math.floor(Math.random()*sc.length);
    if(np>=sc.length){np=sc.length-2;nd=-1;}if(np<0){np=1;nd=1;}
    if(np!==old)return[np,nd,true];
  }
  return[(p+1)%sc.length,d,true];
}

// ============================================================

const T={};
function setT(name,fn,ms){T[name]=setTimeout(fn,ms);}
function clearAll(){Object.keys(T).forEach(k=>{clearTimeout(T[k]);delete T[k];})}

// ============================================================
// RHYTHM
// ============================================================
function melRhythm(scene,bpm){
  const q=60000/bpm,e=q/2,s=q/4,t=q/3;
  const r=Math.random();
  if(scene===0){
    if(r<0.4)return{dur:4,next:q*4+Math.random()*q*2};
    if(r<0.7)return{dur:2,next:q*2+Math.random()*q*2};
    if(r<0.9)return{dur:3,next:q*3};
    return{dur:1,next:q*1.5};
  }
  if(scene===1){
    if(r<0.35)return{dur:1,next:q};if(r<0.6)return{dur:0.5,next:e};
    if(r<0.75)return{dur:0.75,next:e*1.5};if(r<0.85)return{dur:0.3,next:s};
    if(r<0.95)return{dur:0.5,next:t};return{dur:0.3,next:e+s};
  }
  if(scene===2){
    if(r<0.3)return{dur:1,next:q*0.4};if(r<0.55)return{dur:1.5,next:q*2.5};
    if(r<0.7)return{dur:1,next:q*1.5};if(r<0.8)return{dur:2,next:q*3};
    if(r<0.9)return{dur:0.75,next:t};return{dur:0.5,next:e};
  }
  if(scene===5){
    if(r<0.3)return{dur:3,next:q*3+Math.random()*q};if(r<0.5)return{dur:2,next:q*2+Math.random()*q};
    if(r<0.65)return{dur:4,next:q*4};if(r<0.8)return{dur:1.5,next:q*1.5};
    if(r<0.88)return{dur:0.15,next:s};if(r<0.96)return{dur:0.5,next:t};
    return{dur:2,next:q*2.5};
  }
  if(scene===6){
    if(r<0.4)return{dur:0.5,next:e};if(r<0.6)return{dur:0.75,next:e};
    if(r<0.75)return{dur:1,next:q};if(r<0.87)return{dur:0.3,next:s};
    if(r<0.95)return{dur:0.5,next:t};return{dur:0.3,next:s*3};
  }
  if(r<0.5)return{dur:1,next:q};if(r<0.7)return{dur:0.5,next:e};
  if(r<0.85)return{dur:1.5,next:q*1.5};if(r<0.93)return{dur:0.3,next:s};
  return{dur:0.5,next:t};
}

// CAMERA + BLOB DETECTION
// ============================================================
let video,blobs=[],prevBlobs=[],sVel=0;
let bgFrame=null;
const oC=document.createElement('canvas');oC.width=80;oC.height=60;
const oX=oC.getContext('2d',{willReadFrequently:true});

async function startCam(){try{
  const st=await navigator.mediaDevices.getUserMedia({video:{width:640,height:360}});
  video=document.createElement('video');video.srcObject=st;await video.play();
  setInterval(doDetect,200);
  log('Camera started.');
}catch(e){log('No camera: '+e.message);}}

function calibrate(){
  if(!video||!video.videoWidth)return;
  oX.drawImage(video,0,0,80,60);
  bgFrame=oX.getImageData(0,0,80,60);
  log('Calibrated — background captured');
  $('btnCal').textContent='Recalibrate';
}
window._calibrate=calibrate;

function doDetect(){
  if(!video||!video.videoWidth||!started)return;
  // Always run MediaPipe when enabled
  if(G.mpOn)runMP();
  const s=SC[curScene];
  if(s.det==='off'){blobs=[];prevBlobs=[];$('nB').textContent=0;return;}
  prevBlobs=[...blobs];
  oX.drawImage(video,0,0,80,60);
  const fd=oX.getImageData(0,0,80,60);
  const sensScale=G.sens/50;
  const pts=[];

  if(bgFrame){
    const bg=bgFrame.data;
    for(let y=0;y<60;y+=3)for(let x=0;x<80;x+=3){
      const i=(y*80+x)*4;
      const diff=Math.abs(fd.data[i]-bg[i])+Math.abs(fd.data[i+1]-bg[i+1])+Math.abs(fd.data[i+2]-bg[i+2]);
      if(diff>G.thresh*sensScale)pts.push({x:x/80,y:y/60,br:diff/765});
    }
  } else {
    const thr=G.dark?25+(100-G.sens)*0.3:G.thresh;
    for(let y=0;y<60;y+=3)for(let x=0;x<80;x+=3){
      const i=(y*80+x)*4;
      const br=(fd.data[i]+fd.data[i+1]+fd.data[i+2])/3;
      if(br>thr)pts.push({x:x/80,y:y/60,br:br/255});
    }
  }

  // Cluster
  const cl=[],u=new Set();
  for(let i=0;i<pts.length;i++){if(u.has(i))continue;
    let bx=pts[i].x,by=pts[i].y,bb=pts[i].br,n=1;u.add(i);
    for(let j=i+1;j<pts.length;j++){if(u.has(j))continue;
      if(Math.abs(pts[j].x-bx/n)<0.1&&Math.abs(pts[j].y-by/n)<0.1){
        bx+=pts[j].x;by+=pts[j].y;bb=Math.max(bb,pts[j].br);n++;u.add(j);}}
    cl.push({x:bx/n,y:by/n,br:bb,sz:n});}
  blobs=cl.sort((a,b)=>b.sz-a.sz).slice(0,10);

  // Velocity
  let v=0,nm=Math.min(blobs.length,prevBlobs.length);
  for(let i=0;i<nm;i++)v+=Math.sqrt((blobs[i].x-prevBlobs[i].x)**2+(blobs[i].y-prevBlobs[i].y)**2);
  sVel=sVel*0.7+(nm>0?v/nm:0)*0.3;

  // Body detection state
  if(blobs.length>0){bodyDetected=true;lastBodyTime=performance.now();}
  else if(performance.now()-lastBodyTime>BODY_TIMEOUT){bodyDetected=false;}

  // Auto-melody crossfade
  if(bodyDetected)autoMelScale=Math.max(0.15,autoMelScale-0.05);
  else autoMelScale=Math.min(1,autoMelScale+0.02);

  // UI
  $('nB').textContent=blobs.length;
  $('nVv').textContent=sVel.toFixed(3);
  $('mVl').style.width=Math.min(sVel*1000,100)+'%';

  // Trigger interactive sounds
  trigInteractive();
}

// MEDIAPIPE — tasks-vision PoseLandmarker (multi-person)
// ============================================================
let PoseLandmarker=null, FilesetResolver=null, poseLandmarker=null;
let poses=[], prevPoses=[], poseVels=[];
let lastMPTime=0;

async function loadMP(){
  $('nP').textContent='loading...';
  try{
    const vision=await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm");
    PoseLandmarker=vision.PoseLandmarker;
    FilesetResolver=vision.FilesetResolver;
    const fileset=await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    poseLandmarker=await PoseLandmarker.createFromOptions(fileset,{
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate:"GPU"
      },
      runningMode:"VIDEO",
      numPoses:G.numPoses,
      minPoseDetectionConfidence:0.5,
      minTrackingConfidence:0.5,
    });
    $('nP').textContent='ready';
    log('MediaPipe PoseLandmarker loaded ('+G.numPoses+' persons)');
  }catch(e){$('nP').textContent='fail';console.error('MP load error:',e);}
}

function runMP(){
  if(!poseLandmarker||!video||video.readyState<2)return;
  const now=performance.now();
  if(now<=lastMPTime)return;
  lastMPTime=now;
  try{
    const results=poseLandmarker.detectForVideo(video,now);
    prevPoses=[...poses];
    poses=[];
    if(results.landmarks&&results.landmarks.length>0){
      poses=results.landmarks.slice(0,G.numPoses);
      // Update body detection
      bodyDetected=true;lastBodyTime=now;
    }
    $('nP').textContent=poses.length>0?poses.length+'p':'lost';

    // Compute per-pose velocities
    poseVels=[];
    for(let di=0;di<poses.length;di++){
      if(!prevPoses[di]){poseVels.push(0);continue;}
      const js=[11,12,13,14,15,16,23,24,25,26,27,28];
      let mx=0;
      js.forEach(j=>{
        if(!poses[di][j]||!prevPoses[di][j])return;
        const c=poses[di][j],p=prevPoses[di][j];
        const v=Math.sqrt((c.x-p.x)**2+(c.y-p.y)**2);
        if(v>mx)mx=v;
      });
      poseVels.push(mx);
    }
  }catch(e){}
}

// ============================================================
// RAW WEB AUDIO DRUMS — CEING style
// ============================================================
let plxCtx=null;
function getPlxCtx(){
  if(!plxCtx&&sonic)plxCtx=sonic.audioContext||new AudioContext();
  return plxCtx;
}
function plxKick(v){
  const ctx=getPlxCtx();if(!ctx)return;const t=ctx.currentTime;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(40,t+0.12);
  g.gain.setValueAtTime(Math.min(v*0.7,0.8)*volScale,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.35);
}
function plxSnare(v){
  const ctx=getPlxCtx();if(!ctx)return;const t=ctx.currentTime;
  const b=ctx.createBuffer(1,ctx.sampleRate*0.12,ctx.sampleRate);
  const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=ctx.createBufferSource();s.buffer=b;
  const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=3000;
  const ng=ctx.createGain();ng.gain.setValueAtTime(Math.min(v*0.35,0.4)*volScale,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  s.connect(f);f.connect(ng);ng.connect(ctx.destination);
  const o=ctx.createOscillator(),og=ctx.createGain();
  o.type='sine';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+0.05);
  og.gain.setValueAtTime(Math.min(v*0.45,0.5)*volScale,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  o.connect(og);og.connect(ctx.destination);
  s.start(t);s.stop(t+0.15);o.start(t);o.stop(t+0.12);
}
function plxHiHat(v){
  const ctx=getPlxCtx();if(!ctx)return;const t=ctx.currentTime;
  const b=ctx.createBuffer(1,ctx.sampleRate*0.06,ctx.sampleRate);
  const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const s=ctx.createBufferSource();s.buffer=b;
  const f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=7000;
  const g=ctx.createGain();g.gain.setValueAtTime(Math.min(v*0.35,0.5)*volScale,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
  s.connect(f);f.connect(g);g.connect(ctx.destination);s.start(t);s.stop(t+0.08);
}

// ============================================================
// 60FPS POSE TRIGGER — scene-aware: drums on scene 4, melody on others
// ============================================================
let lastPlx=0, poseVel=0;
function trigPlexus60fps(){
  if(poses.length===0||prevPoses.length===0)return;
  const now=performance.now();

  // Use max velocity across all detected persons
  let mx=0;
  poseVels.forEach(v=>{if(v>mx)mx=v;});

  poseVel=poseVel*0.8+mx*0.2;

  const velThresh=G.poseThresh;
  if(poseVel<velThresh)return;

  const speedNorm=Math.min((poseVel-velThresh)/0.06,1);
  const retrigger=200-(200-40)*speedNorm;
  if(now-lastPlx<retrigger)return;
  lastPlx=now;

  const v=Math.min(speedNorm*1.2,1);

  if(curScene===4){
    if(poseVel<0.02){plxKick(v);}
    else if(poseVel<0.045){plxSnare(v);}
    else{plxHiHat(v);if(Math.random()<0.4)plxSnare(v*0.4);}
  }else{
    const s=SC[curScene],scale=SCALES[curScene];
    if(s.intSynth&&scale&&scale.length){
      const note=scale[Math.floor(Math.random()*scale.length)];
      playInterMel(s.intSynth,note,0.8+v*1.5,{amp:(s.intAmp||0.15)*(0.4+v*0.6),release:1+v,pan:(Math.random()-0.5)*1.0});
    }
  }
}

// ============================================================
// INTERACTIVE TRIGGERS — body → sound (5fps)
// ============================================================
let lastB=0;
function trigInteractive(){
  if(!started||blobs.length===0)return;
  const now=performance.now(),b=blobs[0],si=curScene;
  const s=SC[si],scale=SCALES[si];
  const bv=prevBlobs[0]?Math.sqrt((b.x-prevBlobs[0].x)**2+(b.y-prevBlobs[0].y)**2):0;
  const sensScale=G.sens/50;
  let info='';

  if(si===1&&bv>0.01*sensScale&&now-lastB>250/sensScale){lastB=now;
    const note=BELLS[Math.floor(b.y*(BELLS.length-1))];
    playInterMel(s.intSynth,note,1.5,{amp:s.intAmp*(0.5+bv*5),release:1.5,pan:(b.x-0.5)*1.5});
    for(let i=1;i<Math.min(blobs.length,4);i++){if(!prevBlobs[i])continue;
      const vi=Math.sqrt((blobs[i].x-prevBlobs[i].x)**2+(blobs[i].y-prevBlobs[i].y)**2);
      if(vi>0.012&&Math.random()<0.3)playInterMel(s.intSynth,BELLS[Math.floor(blobs[i].y*(BELLS.length-1))],1,{amp:s.intAmp*0.5,release:1,pan:(blobs[i].x-0.5)*1.5});}
    info='bell';
  }

  if(si===2&&bv>0.008*sensScale&&now-lastB>300/sensScale){lastB=now;
    const idx=Math.floor(b.y*(scale.length-1));
    const note=scale[idx];
    const jump=pick([2,3,4]);
    const partner=scale[Math.min(idx+jump,scale.length-1)];
    playInterMel(s.intSynth,note,1.2,{amp:s.intAmp*(0.5+bv*4),release:1.5,pan:(b.x-0.5)*1.2});
    setTimeout(()=>playInterMel(s.intSynth,partner,1,{amp:s.intAmp*0.6,release:1.2,pan:(b.x-0.5)*-0.8}),150);
    info='harp pair';
  }

  if(si===4){info='plexus poseVel:'+poseVel.toFixed(4)+' blobVel:'+sVel.toFixed(3);}

  if(si===5&&bv>0.008*sensScale&&now-lastB>200/sensScale){lastB=now;
    const note=scale[Math.floor(b.y*(scale.length-1))];
    playInterMel(s.intSynth,note,2,{amp:s.intAmp*(0.4+bv*3),release:2,pan:(b.x-0.5)*1.2});
    info='float';
  }

  if(si===6){blobs.forEach((bl,i)=>{if(i>5||!prevBlobs[i])return;
    const vi=Math.sqrt((bl.x-prevBlobs[i].x)**2+(bl.y-prevBlobs[i].y)**2);
    if(vi>0.008*sensScale&&Math.random()<0.2){
      const note=scale[Math.floor(bl.y*(scale.length-1))];
      playInterMel(s.intSynth,note,1.5,{amp:s.intAmp*(0.3+vi*3),release:1.5,pan:(bl.x-0.5)*1.4});
    }});info=blobs.length+' chimes';}

  $('aI').textContent=info||s.det;
}

function nextChordIdx(pci,len){
  const r=Math.random();
  if(r<0.40)return(pci+1)%len;
  if(r<0.65)return(pci+1+Math.floor(Math.random()*2))%len;
  if(r<0.85)return pci;
  return Math.floor(Math.random()*len);
}

    setT('fhat',tick,next*(0.8+Math.random()*0.4));

// ============================================================
function setScene(n){
  if(!started)return;curScene=n;ci=0;
  const s=SC[n],scale=SCALES[n];
  if(scale.length){mP=Math.min(mP,scale.length-1);m2P=Math.min(m2P,scale.length-1);mBP=Math.min(mBP,scale.length-1);}
  if(!bpmOverride){$('bpmCtrl').value=s.bpm;}
  startAllLoops();
  $('scene-name').textContent='#'+n+' '+s.name;
  const pct=s.energy*10;
  $('energy-fill').style.width=pct+'%';
  $('energy-fill').style.background=s.energy>7?'#f44':s.energy>4?'#fa4':s.energy>2?'#48a':'#446';
  document.querySelectorAll('.sb').forEach((el,i)=>el.classList.toggle('on',i===n));
  log('Scene '+n+': '+s.name+' | det:'+s.det+' | '+getBpm()+'bpm');
}

// ============================================================
// MANDALA RENDERING — 8-fold rotational symmetry from pose
// ============================================================
function renderMandala(){
  // Fade trail
  mandalaCx.fillStyle='rgba(10,8,5,0.03)';
  mandalaCx.fillRect(0,0,mandalaC.width,mandalaC.height);

  const cxM=mandalaC.width/2, cyM=mandalaC.height/2;
  const folds=8;

  for(let di=0;di<poses.length;di++){
    const pose=poses[di];
    if(!pose)continue;
    const colors=MANDALA_COLORS[di%MANDALA_COLORS.length];
    // Confidence from avg visibility of key landmarks
    const KEY_LM=[0,11,12,15,16,23,24,27,28];
    let conf=0,cnt=0;
    KEY_LM.forEach(i=>{if(pose[i]&&pose[i].visibility!=null){conf+=pose[i].visibility;cnt++}});
    conf=cnt>0?conf/cnt:0.5;
    const ah=Math.round(96*conf).toString(16).padStart(2,'0');

    for(let f=0;f<folds;f++){
      const ang=(f/folds)*Math.PI*2;
      const mir=f%2===0?1:-1;
      mandalaCx.save();
      mandalaCx.translate(cxM,cyM);
      mandalaCx.rotate(ang);
      mandalaCx.scale(mir,1);
      mandalaCx.translate(-cxM,-cyM);

      // Draw landmark dots
      pose.forEach((lm,i)=>{
        if((lm.visibility||0)<0.4)return;
        mandalaCx.beginPath();
        mandalaCx.arc(lm.x*mandalaC.width,lm.y*mandalaC.height,2,0,Math.PI*2);
        mandalaCx.fillStyle=colors[i%4]+ah;
        mandalaCx.fill();
      });

      // Draw body connections
      BODY_CONNECTIONS.forEach(([a,b])=>{
        const la=pose[a],lb=pose[b];
        if(!la||!lb||(la.visibility||0)<0.3||(lb.visibility||0)<0.3)return;
        mandalaCx.beginPath();
        mandalaCx.moveTo(la.x*mandalaC.width,la.y*mandalaC.height);
        mandalaCx.lineTo(lb.x*mandalaC.width,lb.y*mandalaC.height);
        mandalaCx.strokeStyle=colors[0]+ah;
        mandalaCx.lineWidth=1;
        mandalaCx.stroke();
      });

      mandalaCx.restore();
    }
  }

  // Copy to main screen
  mvx.drawImage(mandalaC,0,0,MW,MH);
}

// ============================================================
// MONITOR + MAIN DRAW LOOP
// ============================================================
let fN=0,fT=0;

function draw(now){
  // Pose-driven triggers at 60fps
  if(started&&G.mpOn)trigPlexus60fps();

  // Clear monitor
  cx.fillStyle='#080810';cx.fillRect(0,0,W,H);
  const col=SC[curScene]?.color||'#448';

  // Camera feed
  if(video&&video.videoWidth){
    const vw=video.videoWidth,vh=video.videoHeight;
    const scale=Math.min(W/vw,H/vh);
    const dw=vw*scale,dh=vh*scale;
    const dx=(W-dw)/2,dy=(H-dh)/2;
    cx.globalAlpha=0.5;cx.drawImage(video,dx,dy,dw,dh);cx.globalAlpha=1;
  }

  // Camera-aligned coords
  const vw=video?video.videoWidth||320:320,vh=video?video.videoHeight||240:240;
  const scale=Math.min(W/vw,H/vh);
  const dw=vw*scale,dh=vh*scale,dx=(W-dw)/2,dy=(H-dh)/2;
  function cx2(nx){return dx+nx*dw}
  function cy2(ny){return dy+ny*dh}

  // Blob dots (skip scene 4)
  if(curScene!==4){
    blobs.forEach(b=>{
      cx.fillStyle=col;cx.beginPath();cx.arc(cx2(b.x),cy2(b.y),3+b.sz*0.5,0,Math.PI*2);cx.fill();
    });
  }

  // Pose skeletons (all detected persons)
  const skelColors=['#0f0','#0cf','#f80'];
  for(let di=0;di<poses.length;di++){
    const lm=poses[di];if(!lm)continue;
    const sc=skelColors[di%skelColors.length];
    cx.strokeStyle=sc;cx.lineWidth=1;
    [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]].forEach(([a,b])=>{
      if(!lm[a]||!lm[b])return;
      cx.beginPath();cx.moveTo(cx2(lm[a].x),cy2(lm[a].y));cx.lineTo(cx2(lm[b].x),cy2(lm[b].y));cx.stroke();});
    lm.forEach(l=>{if(!l)return;cx.fillStyle=sc;cx.beginPath();cx.arc(cx2(l.x),cy2(l.y),2,0,Math.PI*2);cx.fill();});
  }

  // Status text on monitor
  cx.fillStyle='#446';cx.font='9px monospace';
  cx.fillText('#'+curScene+' '+SC[curScene].name+' | '+getBpm()+'bpm | poses:'+poses.length+' poseVel:'+poseVel.toFixed(3),4,H-4);

  // Main screen: mandala visual
  if(started)renderMandala();

  // FPS
  fN++;if(now-fT>1000){$('nF').textContent=fN;fN=0;fT=now;}
}
function loop(now){requestAnimationFrame(loop);draw(now);}
rz();
requestAnimationFrame(loop);
