<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Afterlife Dance — Engine v8</title>
<script src="https://unpkg.com/tone@14"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#ddd;font-family:system-ui;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#ui{position:absolute;top:0;right:0;width:250px;height:100%;background:rgba(0,0,0,0.92);padding:8px;overflow-y:auto;font-size:11px;z-index:10;border-left:1px solid #222}
.s{margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #1a1a1a}
.st{color:#555;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.r{display:flex;align-items:center;gap:4px;margin:2px 0}
.r label{width:58px;color:#666;font-size:9px;flex-shrink:0}
.r input[type=range]{flex:1;height:3px;-webkit-appearance:none;background:#333;border-radius:2px;outline:none}
.r input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:#777;border-radius:50%;cursor:pointer}
.r .v{width:28px;color:#444;font-size:9px;text-align:right}
.r input[type=number]{width:46px;background:#111;border:1px solid #222;color:#aaa;padding:1px 3px;font-size:10px;border-radius:2px}
.bs{display:flex;gap:2px;flex-wrap:wrap}
.b{background:#1a1a1a;border:1px solid #333;color:#888;padding:2px 5px;cursor:pointer;border-radius:2px;font-size:10px;text-align:center}
.b.on{background:#335;color:#aaf;border-color:#557}.b.act{background:#333;color:#fff;border-color:#666}
.sb{flex:1;min-width:24px}
.m{height:3px;background:#1a1a1a;border-radius:2px;margin:2px 0}
.mf{height:100%;border-radius:2px;transition:width 0.15s}
#sn{position:absolute;top:8px;left:8px;color:#1a1a1a;font-size:28px;font-weight:700;z-index:5;pointer-events:none}
#inf{position:absolute;bottom:4px;left:4px;color:#282828;font-size:9px;z-index:10}
</style></head><body>
<canvas id="cv"></canvas>
<div id="sn">0 Chanting</div>
<div id="ui">
<div class="s"><div class="st">Scene (0-6)</div><div class="bs" id="sB"></div></div>
<div class="s"><div class="st">Controls</div>
<div class="r"><label>BPM</label><input type=number value=72 min=40 max=200 oninput="G.bpm=+this.value;$('vB').textContent=this.value;if(ok)Tone.Transport.bpm.rampTo(+this.value,0.5)"><span class=v id=vB>72</span></div>
<div class="r"><label>Volume</label><input type=range min=0 max=100 value=55 oninput="G.vol=this.value/100;$('vV').textContent=this.value;if(ok)Tone.Destination.volume.rampTo(Tone.gainToDb(this.value/100),0.3)"><span class=v id=vV>55</span></div>
<div class="r"><label>Sensitivity</label><input type=range min=1 max=100 value=50 oninput="G.sens=+this.value;$('vS').textContent=this.value"><span class=v id=vS>50</span></div>
<div class="r"><label>Echo</label><input type=range min=0 max=100 value=35 oninput="G.echo=this.value/100;$('vE').textContent=this.value;if(FX.iDly)FX.iDly.wet.rampTo(this.value/100,0.3)"><span class=v id=vE>35</span></div>
<div class="r"><label>Trans.Time</label><input type=range min=500 max=8000 value=3000 oninput="G.trT=+this.value;$('vT').textContent=(this.value/1000).toFixed(1)+'s'"><span class=v id=vT>3.0s</span></div>
</div>
<div class="s"><div class="st">Mode</div>
<div class="bs">
<div class="b on" id=mL onclick="G.dark=false;Z('mL',1);Z('mD',0)">☀Light</div>
<div class="b" id=mD onclick="G.dark=true;Z('mD',1);Z('mL',0)">🌙Dark</div>
<div class="b on" id=mDb onclick="G.dbg=!G.dbg;Z('mDb')">Debug(D)</div>
<div class="b" id=mMp onclick="G.mpOn=!G.mpOn;Z('mMp');if(G.mpOn&&!mpObj)loadMP()">Pose(P)</div>
</div></div>
<div class="s"><div class="st">Detection: <span id=dM>auto</span></div>
<div style="color:#444;font-size:9px">Blobs:<span id=nB>0</span> Pose:<span id=nP>off</span> FPS:<span id=nF>0</span></div>
<div class="r"><label>Velocity</label><div class=m style="flex:1"><div class=mf id=mVl style="background:#ff8844;width:0%"></div></div><span class=v id=nVv>0</span></div>
</div>
<div class="s"><div class="st">4 Principles</div>
<div class="r"><label>Focal</label><div class=m style="flex:1"><div class=mf id=p0 style="background:#4488ff;width:0%"></div></div></div>
<div class="r"><label>Energy</label><div class=m style="flex:1"><div class=mf id=p1 style="background:#44ff88;width:0%"></div></div></div>
<div class="r"><label>Curvature</label><div class=m style="flex:1"><div class=mf id=p2 style="background:#aa44ff;width:0%"></div></div></div>
<div class="r"><label>Awareness</label><div class=m style="flex:1"><div class=mf id=p3 style="background:#ffaa44;width:0%"></div></div></div>
</div>
<div class="s"><div class="st">Active</div><div style="color:#446;font-size:9px" id=aI>—</div></div>
</div>
<div id=inf>Click to start | 0-6:scenes D:debug M:mute L:mode P:pose</div>

<script>
const $=id=>document.getElementById(id);
const Z=(id,f)=>{const e=$(id);if(f!==undefined)e.classList.toggle('on',!!f);else e.classList.toggle('on')};
const cv=$('cv'),cx=cv.getContext('2d');
let W,H;function rz(){W=cv.width=innerWidth;H=cv.height=innerHeight}rz();onresize=rz;

// ─────── STATE ───────
const G={bpm:72,vol:0.55,sens:50,echo:0.35,trT:3000,dark:false,dbg:true,mpOn:false,muted:false,sc:0,tgt:0,tPr:1};
const SC=[{n:'Chanting',c:'#555',d:'off'},{n:'Formation',c:'#4488ff',d:'blob'},{n:'Binary',c:'#44aa88',d:'blob'},{n:'Formless',c:'#886644',d:'off'},{n:'Supernova',c:'#ff4444',d:'pose+blob'},{n:'Collapse',c:'#884488',d:'blob'},{n:'Distribute',c:'#ffaa44',d:'blob'}];
let ok=false; // audio started

// Scene buttons
$('sB').innerHTML=SC.map((s,i)=>`<div class="b sb${i===0?' act':''}" id=sb${i} onclick="goSc(${i})" title="${s.n}">${i}</div>`).join('');

function goSc(n){if(n===G.tgt&&G.tPr>=1)return;G.sc=gS();G.tgt=n;G.tPr=0;
  document.querySelectorAll('#sB .b').forEach((b,i)=>b.classList.toggle('act',i===n));
  $('sn').textContent=n+' '+SC[n].n;$('sn').style.color=SC[n].c;$('dM').textContent=SC[n].d;
  if(SC[n].d.includes('pose')&&!mpObj)loadMP();if(ok)onSceneSwitch(n);}
function gS(){if(G.tPr>=1)return G.tgt;const t=G.tPr<0.5?2*G.tPr*G.tPr:1-Math.pow(-2*G.tPr+2,2)/2;return G.sc+(G.tgt-G.sc)*t;}

// ─────── SCALES ───────
const BELLS=['C5','D5','E5','G5','A5','C6','D6','E6'];
// Per-scene melody scales — same key (Am), different register/vibe
const SCALES={
  0:['A3','C4','D4','E4','G4'],                                    // whisper
  1:['C4','D4','E4','G4','A4','C5','D5','E5'],                    // rising
  2:['A3','C4','E4','G4','A4','C5','E5'],                          // orbiting pairs
  3:[],                                                              // void
  4:['A3','C4','D4','E4','G4','A4','C5','D5','E5','G5','A5','C6'],// full chaos
  5:['E5','G5','A5','C6','D6','E6','G6','A6'],                    // ethereal high
  6:['C4','E4','G4','A4','C5','E5'],                                // warm resolve
};
// Per-scene chord voicings — same key (Am), different density/register
const CHORDS={
  0:[{p:['A1','E2','A2'],h:[]},{p:['D2','A2','D3'],h:[]},{p:['E2','B2','E3'],h:[]},{p:['A1','E2','A2'],h:[]}],
  1:[{p:['A2','C3','E3','A3','C4'],h:['E4','A4']},{p:['F2','A2','C3','F3','A3'],h:['C4','F4']},{p:['G2','B2','D3','G3','B3'],h:['D4','G4']},{p:['E2','G2','B2','E3','G3'],h:['B3','E4']},{p:['D2','F2','A2','D3','F3'],h:['A3','D4']}],
  2:[{p:['A2','E3','A3','E4'],h:[]},{p:['C3','G3','C4','G4'],h:[]},{p:['D3','A3','D4','A4'],h:[]},{p:['E3','B3','E4','B4'],h:[]}],
  3:[{p:['A1','A2'],h:[]},{p:['E1','E2'],h:[]},{p:['D1','D2'],h:[]},{p:['A1','A2'],h:[]}],
  4:[{p:['A1','A2','E3','A3','E4'],h:['A4']},{p:['D2','D3','A3','D4','A4'],h:['D5']},{p:['E2','E3','B3','E4','B4'],h:['E5']},{p:['G2','G3','D4','G4','D5'],h:[]},{p:['F2','F3','C4','F4','C5'],h:[]}],
  5:[{p:['A3','E4','A4','C5'],h:[]},{p:['D3','A4','D5','F5'],h:[]},{p:['E3','B4','E5','G5'],h:[]},{p:['A3','E4','A4','C5'],h:[]}],
  6:[{p:['A2','C3','E3','A3','E4'],h:['A4']},{p:['F2','A2','C3','F3','C4'],h:['F4']},{p:['G2','B2','D3','G3','D4'],h:['G4']},{p:['A2','C3','E3','A3','E4'],h:['A4']}],
};
// Per-scene energy params
const SP={
  0:{bpm:72,melRest:0.55,melDurs:['2n','1m'],padVel:0.18,sparkleP:0,breathRate:0.12},
  1:{bpm:108,melRest:0.12,melDurs:['8n','8n.','4n','4n.'],padVel:0.25,sparkleP:0.18,breathRate:0.18},
  2:{bpm:100,melRest:0.18,melDurs:['8n','4n','4n.'],padVel:0.22,sparkleP:0.15,breathRate:0.22},
  3:{bpm:60,melRest:1,melDurs:['1m'],padVel:0.12,sparkleP:0,breathRate:0.08},
  4:{bpm:138,melRest:0.03,melDurs:['16n','8n','8n.','4n'],padVel:0.3,sparkleP:0.4,breathRate:0.3},
  5:{bpm:80,melRest:0.28,melDurs:['4n','4n.','2n','1m'],padVel:0.2,sparkleP:0.08,breathRate:0.1},
  6:{bpm:92,melRest:0.32,melDurs:['4n','2n','2n.'],padVel:0.22,sparkleP:0.12,breathRate:0.15},
};
let ci=0,mP=2,mD=1,m2P=3,m2D=-1;
// No-repeat walk
function walk(p,d,sc,rp=0){if(!sc||!sc.length)return[0,1,false];const old=p;
  for(let i=0;i<6;i++){let np=p,nd=d;const r=Math.random();
    if(r<rp)return[p,d,false];
    if(r<.35+rp)np+=nd;else if(r<.55+rp)np+=nd*2;else if(r<.7+rp){nd*=-1;np+=nd;}else if(r<.85+rp)np+=Math.round(Math.random()*2)-1;else np=Math.floor(Math.random()*sc.length);
    if(np>=sc.length){np=sc.length-2;nd=-1;}if(np<0){np=1;nd=1;}if(np!==old)return[np,nd,true];}
  return[(p+1)%sc.length,d,true];}

// ─────── AUDIO INIT ───────
const FX={},SY={};
async function initAudio(){
  // Effects
  FX.rev=new Tone.Reverb(6);FX.rev.toDestination();await FX.rev.ready;
  FX.cho=new Tone.Chorus({frequency:0.2,delayTime:3.5,depth:0.6,wet:0.2}).connect(FX.rev);
  FX.dly1=new Tone.FeedbackDelay({delayTime:'8n.',feedback:0.2,wet:0.2}).connect(FX.rev);
  FX.dly2=new Tone.FeedbackDelay({delayTime:'4n',feedback:0.25,wet:0.25}).connect(FX.rev);
  FX.iDly=new Tone.FeedbackDelay({delayTime:'8n',feedback:0.3,wet:G.echo}).connect(FX.rev);

  // Synths
  SY.pad=new Tone.PolySynth(Tone.FMSynth,{maxPolyphony:10,options:{harmonicity:1,modulationIndex:0.4,envelope:{attack:2.5,decay:1.5,sustain:0.8,release:4},modulation:{type:'sine'},oscillator:{type:'sine'}}});
  SY.pad.volume.value=-18;SY.pad.connect(FX.cho);

  SY.pad2=new Tone.PolySynth(Tone.AMSynth,{maxPolyphony:6,options:{harmonicity:2,envelope:{attack:3,decay:2,sustain:0.6,release:5},oscillator:{type:'triangle'},modulation:{type:'sine'}}});
  SY.pad2.volume.value=-22;SY.pad2.connect(FX.cho);

  SY.mel=new Tone.FMSynth({harmonicity:3,modulationIndex:1,envelope:{attack:0.01,decay:0.4,sustain:0.25,release:1},modulation:{type:'triangle'},oscillator:{type:'sine'}});
  SY.mel.volume.value=-14;SY.mel.connect(FX.dly1);

  SY.mel2=new Tone.AMSynth({harmonicity:2,envelope:{attack:0.05,decay:0.6,sustain:0.15,release:1.5},oscillator:{type:'triangle'},modulation:{type:'sine'}});
  SY.mel2.volume.value=-18;SY.mel2.connect(FX.dly2);

  SY.sparkle=new Tone.MetalSynth({frequency:300,envelope:{attack:0.001,decay:1.5,release:1},harmonicity:5.1,modulationIndex:16,resonance:3000,octaves:1.5});
  SY.sparkle.volume.value=-24;SY.sparkle.connect(FX.rev);

  SY.kick=new Tone.MembraneSynth({pitchDecay:0.05,octaves:6,envelope:{attack:0.001,decay:0.3,sustain:0,release:0.3}});
  SY.kick.volume.value=-10;SY.kick.connect(FX.rev);

  SY.iBell=new Tone.PolySynth(Tone.FMSynth,{maxPolyphony:8,options:{harmonicity:5.4,modulationIndex:6,envelope:{attack:0.001,decay:2.5,sustain:0,release:2},modulation:{type:'sine'},oscillator:{type:'sine'}}});
  SY.iBell.volume.value=-10;SY.iBell.connect(FX.iDly);

  // Gibberish: NoiseSynth → 2 formant filters
  SY.gib=new Tone.NoiseSynth({noise:{type:'pink'},envelope:{attack:0.05,decay:0.3,sustain:0.3,release:0.5}});
  SY.gibF1=new Tone.Filter({type:'bandpass',frequency:700,Q:5});
  SY.gibF2=new Tone.Filter({type:'bandpass',frequency:1200,Q:4});
  const gibG=new Tone.Gain(0.15);
  SY.gib.connect(SY.gibF1);SY.gib.connect(SY.gibF2);
  SY.gibF1.connect(gibG);SY.gibF2.connect(gibG);gibG.connect(FX.rev);
  SY.gib.volume.value=-12;

  // Breathing noise
  SY.breathN=new Tone.Noise('pink');
  SY.breathF=new Tone.Filter({frequency:800,type:'bandpass',Q:1.5});
  SY.breathLFO=new Tone.LFO({frequency:0.15,min:0,max:0.2,type:'sine'});
  SY.breathG=new Tone.Gain(0.15);
  SY.breathN.connect(SY.breathF);SY.breathF.connect(SY.breathG);
  SY.breathG.connect(FX.rev);SY.breathLFO.connect(SY.breathG.gain);
  SY.breathN.start();SY.breathLFO.start();
}

// ─────── LOOPS ───────
function startLoops(){
  Tone.Transport.bpm.value=G.bpm;Tone.Transport.swing=0.05;

  // Pad — per-scene chords
  new Tone.Loop(t=>{try{const si=Math.round(gS());
    SY.pad.releaseAll(t);SY.pad2.releaseAll(t);
    const chords=CHORDS[si];const ch=chords[ci%chords.length];
    const pv=SP[si].padVel;
    ch.p.forEach((n,i)=>SY.pad.triggerAttack(n,t+i*0.03,pv+Math.random()*0.08));
    if(ch.h.length)ch.h.forEach((n,i)=>SY.pad2.triggerAttack(n,t+0.1+i*0.05,0.1+Math.random()*0.08));
    ci++;}catch(e){}},'2m').start(0);

  // Melody — per-scene scale, density, durations
  new Tone.Loop(t=>{try{const si=Math.round(gS());const sp=SP[si];
    if(Math.random()<sp.melRest)return;
    const sc=SCALES[si];if(!sc.length)return;
    const[p,d,play]=walk(mP,mD,sc);mP=p;mD=d;if(!play)return;
    const dur=sp.melDurs[Math.floor(Math.random()*sp.melDurs.length)];
    SY.mel.triggerAttackRelease(sc[mP],dur,t,0.15+Math.random()*0.3);
  }catch(e){}},'8n').start(0);

  // Counter melody — scenes 1,2,6
  new Tone.Loop(t=>{try{const si=Math.round(gS());if(si===0||si===3||si===4||si===5)return;
    const sc=SCALES[si];if(!sc.length)return;
    const[p,d,play]=walk(m2P,m2D,sc,0.35);m2P=p;m2D=d;
    if(!play||Math.random()>0.55)return;
    SY.mel2.triggerAttackRelease(sc[m2P],['4n','4n.','2n'][Math.floor(Math.random()*3)],t,0.1+Math.random()*0.15);
  }catch(e){}},'4n').start('8n');

  // Sparkle — per-scene probability
  new Tone.Loop(t=>{try{const si=Math.round(gS());
    if(Math.random()<SP[si].sparkleP)SY.sparkle.triggerAttackRelease('32n',t,0.06+Math.random()*0.15);
  }catch(e){}},'8n').start('16n');

  // Heartbeat — scenes 0,6
  new Tone.Loop(t=>{try{const si=Math.round(gS());if(si!==0&&si!==6)return;
    SY.kick.triggerAttackRelease('C1','8n',t,0.4+Math.random()*0.15);
  }catch(e){}},'2n').start(0);

  // Scene 3: gibberish
  new Tone.Loop(t=>{try{const si=Math.round(gS());if(si!==3)return;
    const vow=[[270,2300],[730,1090],[300,870],[660,1720],[520,1190]];
    const v=vow[Math.floor(Math.random()*vow.length)];
    SY.gibF1.frequency.rampTo(v[0],0.1);SY.gibF2.frequency.rampTo(v[1],0.1);
    SY.gib.triggerAttackRelease(['8n','4n','8n.','16n','4n.'][Math.floor(Math.random()*5)],t,0.3+Math.random()*0.4);
  }catch(e){}},'8n').start(0);

  // Scene 3: sub drone
  new Tone.Loop(t=>{try{const si=Math.round(gS());if(si!==3)return;
    SY.mel2.triggerAttackRelease(['C2','D2','E2','G2'][Math.floor(Math.random()*4)],'1m',t,0.06);
  }catch(e){}},'2m').start('4n');

  // Scene 4: base beat
  new Tone.Loop(t=>{try{const si=Math.round(gS());if(si!==4)return;
    SY.kick.triggerAttackRelease('C1','8n',t,0.3+Math.random()*0.15);
    if(Math.random()<0.5)SY.sparkle.triggerAttackRelease('32n',t+Tone.Time('8n').toSeconds(),0.06+Math.random()*0.08);
  }catch(e){}},'4n').start(0);

  // Scene 5: retrigger stutter
  new Tone.Loop(t=>{try{const si=Math.round(gS());if(si!==5)return;
    if(Math.random()<0.25)SY.sparkle.triggerAttackRelease('32n',t,0.03+Math.random()*0.05);
  }catch(e){}},'8n').start(0);

  // Grace notes
  new Tone.Loop(t=>{try{const si=Math.round(gS());if(si===0||si===3)return;
    if(Math.random()<0.2){const n=PENTA[mP],n2=PENTA[Math.min(mP+1,PENTA.length-1)];
      SY.mel.triggerAttackRelease(n,'32n',t,0.04+Math.random()*0.06);
      SY.mel.triggerAttackRelease(n2,'16n',t+Tone.Time('32n').toSeconds(),0.05+Math.random()*0.06);}
  }catch(e){}},'2m').start('4n');

  Tone.Transport.start();
}

function onSceneSwitch(n){try{
  const sp=SP[n];
  // BPM ramp — each scene has its own tempo
  Tone.Transport.bpm.rampTo(sp.bpm,4);
  G.bpm=sp.bpm;$('vB').textContent=sp.bpm;
  // Volumes
  SY.pad.volume.rampTo(n===3?-22:n===4?-14:-16,2);
  SY.pad2.volume.rampTo(n===3||n===4?-30:-22,2);
  SY.mel.volume.rampTo(n===0?-20:n===3?-99:n===4?-8:-12,2);
  SY.mel2.volume.rampTo(n===1||n===2||n===6?-16:-99,2);
  FX.rev.wet.rampTo(n===3||n===5?0.65:n===4?0.15:0.35,2);
  // Breathing adapts to energy
  SY.breathLFO.frequency.rampTo(sp.breathRate,3);
  // Reset chord index
  ci=0;
  if(SCALES[n].length)mP=Math.min(mP,SCALES[n].length-1);
}catch(e){}}

// ─────── CAMERA ───────
let video,blobs=[],prevBlobs=[],sVel=0;
const oC=document.createElement('canvas');oC.width=80;oC.height=60;
const oX=oC.getContext('2d',{willReadFrequently:true});

async function startCam(){try{
  const st=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240}});
  video=document.createElement('video');video.srcObject=st;await video.play();
  setInterval(doDetect,200);
}catch(e){console.warn('cam:',e);}}

function doDetect(){
  if(!video||!video.videoWidth)return;
  const si=Math.round(gS());
  if(SC[si].d==='off'){blobs=[];prevBlobs=[];$('nB').textContent=0;return;}
  prevBlobs=[...blobs];
  oX.drawImage(video,0,0,80,60);
  const fd=oX.getImageData(0,0,80,60);
  const thr=G.dark?25+(100-G.sens)*0.3:80+(100-G.sens)*0.8;
  const pts=[];
  for(let y=0;y<60;y+=3)for(let x=0;x<80;x+=3){const i=(y*80+x)*4;const br=(fd.data[i]+fd.data[i+1]+fd.data[i+2])/3;if(br>thr)pts.push({x:x/80,y:y/60,br:br/255});}
  const cl=[],u=new Set();
  for(let i=0;i<pts.length;i++){if(u.has(i))continue;let bx=pts[i].x,by=pts[i].y,bb=pts[i].br,n=1;u.add(i);
    for(let j=i+1;j<pts.length;j++){if(u.has(j))continue;if(Math.abs(pts[j].x-bx/n)<0.1&&Math.abs(pts[j].y-by/n)<0.1){bx+=pts[j].x;by+=pts[j].y;bb=Math.max(bb,pts[j].br);n++;u.add(j);}}
    cl.push({x:bx/n,y:by/n,br:bb,sz:n});}
  blobs=cl.sort((a,b)=>b.sz-a.sz).slice(0,10);
  let v=0,nm=Math.min(blobs.length,prevBlobs.length);
  for(let i=0;i<nm;i++)v+=Math.sqrt((blobs[i].x-prevBlobs[i].x)**2+(blobs[i].y-prevBlobs[i].y)**2);
  sVel=sVel*0.7+(nm>0?v/nm:0)*0.3;
  $('nB').textContent=blobs.length;$('nVv').textContent=sVel.toFixed(3);
  $('mVl').style.width=Math.min(sVel*1000,100)+'%';
  if(blobs.length>0){$('p0').style.width=(blobs[0].x*100)+'%';$('p1').style.width=Math.min(sVel*600,100)+'%';}
  trigInteractive(si);
  if(SC[si].d.includes('pose')&&G.mpOn)runMP();
}

// ─────── MEDIAPIPE ───────
let mpObj=null,pose=null,prevPose=null,poseH=[];
async function loadMP(){if(mpObj)return;$('nP').textContent='loading...';try{
  const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js';s.crossOrigin='anonymous';document.head.appendChild(s);
  await new Promise((r,j)=>{s.onload=r;s.onerror=j;});
  mpObj=new Pose({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`});
  mpObj.setOptions({modelComplexity:0,smoothLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  mpObj.onResults(r=>{if(r.poseLandmarks){prevPose=pose;pose={lm:r.poseLandmarks,t:performance.now()};poseH.push(pose);if(poseH.length>15)poseH.shift();$('nP').textContent='33pts';
    if(prevPose&&poseH.length>4){const w=poseH.map(p=>p.lm[16]);let tc=0;for(let i=2;i<w.length;i++){const ax=w[i].x-w[i-1].x,ay=w[i].y-w[i-1].y,bx=w[i-1].x-w[i-2].x,by=w[i-1].y-w[i-2].y;tc+=Math.abs(ax*by-ay*bx);}$('p2').style.width=Math.min(tc*3500,100)+'%';}
    if(poseH.length>3){let jk=0;for(let i=2;i<poseH.length;i++)for(let k=0;k<33;k++){const v1=poseH[i].lm[k].x-poseH[i-1].lm[k].x,v2=poseH[i-1].lm[k].x-poseH[i-2].lm[k].x;jk+=Math.abs(v1-v2);}$('p3').style.width=Math.max(0,(1-Math.min(1,jk*3))*100)+'%';}
  }else{pose=null;$('nP').textContent='lost';}});
  $('nP').textContent='ready';
}catch(e){$('nP').textContent='fail';}}
async function runMP(){if(!mpObj||!video)return;try{await mpObj.send({image:video});}catch(e){}}

// ─────── INTERACTIVE TRIGGERS ───────
let lastB=0;
function trigInteractive(si){
  if(!ok||blobs.length===0)return;
  const now=performance.now(),b=blobs[0];
  const bv=prevBlobs[0]?Math.sqrt((b.x-prevBlobs[0].x)**2+(b.y-prevBlobs[0].y)**2):0;
  let info='';
  try{
  // ── Scene 1: bells ──
  if(si===1){
    if(bv>0.01&&now-lastB>250){lastB=now;
      SY.iBell.triggerAttackRelease(BELLS[Math.floor(b.y*(BELLS.length-1))],'2n',undefined,0.1+Math.random()*0.3);info='bell';}
    for(let i=1;i<Math.min(blobs.length,4);i++){if(!prevBlobs[i])continue;
      const vi=Math.sqrt((blobs[i].x-prevBlobs[i].x)**2+(blobs[i].y-prevBlobs[i].y)**2);
      if(vi>0.012&&Math.random()<0.25)SY.iBell.triggerAttackRelease(BELLS[Math.floor(blobs[i].y*(BELLS.length-1))],'4n',Tone.now()+i*0.15,0.04+Math.random()*0.1);}
  }
  // ── Scene 2: entangled pair ──
  if(si===2){
    if(blobs.length>=2&&bv>0.008&&now-lastB>300){lastB=now;
      const nA=PENTA[Math.floor(blobs[0].y*(PENTA.length-1))];
      const nB=PENTA[Math.floor((1-blobs[1].y)*(PENTA.length-1))];
      SY.iBell.triggerAttackRelease(nA,'4n',undefined,0.08+Math.random()*0.15);
      SY.iBell.triggerAttackRelease(nB,'4n',Tone.now()+0.1,0.08+Math.random()*0.15);info='pair';}
    else if(blobs.length===1&&bv>0.01&&now-lastB>300){lastB=now;
      SY.iBell.triggerAttackRelease(PENTA[Math.floor(b.y*(PENTA.length-1))],'4n',undefined,0.08+Math.random()*0.15);info='single';}
  }
  // ── Scene 4: CEING drums ──
  if(si===4){
    // Blob drums
    if(bv>0.015&&now-lastB>100){lastB=now;const v=Math.min(bv*6,0.6);
      if(b.y>0.6)SY.kick.triggerAttackRelease('C1','8n',undefined,v);
      else if(b.y<0.3)SY.sparkle.triggerAttackRelease('32n',undefined,v*0.4);
      else{SY.sparkle.triggerAttackRelease('16n',undefined,v*0.3);SY.kick.triggerAttackRelease('E1','16n',undefined,v*0.5);}
      info='blob drum';}
    // Pose drums
    if(pose&&prevPose&&now-lastB>80){
      const js=[11,12,13,14,15,16,23,24,25,26,27,28];let mx=0,mj=0;
      js.forEach(j=>{const c=pose.lm[j],p=prevPose.lm[j];const v=Math.sqrt((c.x-p.x)**2+(c.y-p.y)**2);if(v>mx){mx=v;mj=j;}});
      if(mx>0.008){lastB=now;const v=Math.min(mx*5,0.6);
        if(mj>=23)SY.kick.triggerAttackRelease('C1','8n',undefined,v);
        else if(mj>=15)SY.sparkle.triggerAttackRelease('32n',undefined,v*0.4);
        else SY.kick.triggerAttackRelease('E1','16n',undefined,v*0.5);
        info='pose j:'+mj;}}
    // Bright blob burst
    if(b.br>0.7&&Math.random()<0.12)SY.iBell.triggerAttackRelease(PENTA[Math.floor(Math.random()*PENTA.length)],'16n',undefined,0.05+Math.random()*0.08);
  }
  // ── Scene 5: ascending ──
  if(si===5&&bv>0.008&&now-lastB>200){lastB=now;
    SY.iBell.triggerAttackRelease(P_HI[Math.floor(b.y*(P_HI.length-1))],'4n',undefined,0.05+Math.random()*0.12);info='asc';}
  // ── Scene 6: multi chime ──
  if(si===6){blobs.forEach((bl,i)=>{if(i>5||!prevBlobs[i])return;
    const vi=Math.sqrt((bl.x-prevBlobs[i].x)**2+(bl.y-prevBlobs[i].y)**2);
    if(vi>0.008&&Math.random()<0.15)SY.iBell.triggerAttackRelease(BELLS[Math.floor(bl.y*(BELLS.length-1))],'2n',Tone.now()+i*0.12,0.04+Math.random()*0.1);});info=blobs.length+' chimes';}
  }catch(e){}
  $('aI').textContent=info||SC[si].d;
}

// ─────── DRAW (rAF only) ───────
const stars=[];for(let i=0;i<150;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2+0.2,tw:Math.random()*0.012+0.003,a:Math.random()*6.28});
const trails=[];let fN=0,fT=0;

function draw(now){
  cx.fillStyle='rgba(10,10,10,0.12)';cx.fillRect(0,0,W,H);
  const si=Math.round(gS()),col=SC[si].c,cw=W-250;
  if(G.dbg&&video){cx.globalAlpha=0.1;cx.drawImage(video,0,0,cw,H);cx.globalAlpha=1;}
  stars.forEach(s=>{s.a+=s.tw;cx.fillStyle=`rgba(180,200,255,${Math.max(0,.25+Math.sin(s.a)*.2)})`;cx.beginPath();cx.arc(s.x*cw,s.y*H,s.r,0,Math.PI*2);cx.fill();});
  blobs.forEach((b,i)=>{
    if(!trails[i])trails[i]=[];trails[i].push({x:b.x,y:b.y});if(trails[i].length>15)trails[i].shift();
    if(trails[i].length>2){cx.beginPath();cx.moveTo(trails[i][0].x*cw,trails[i][0].y*H);for(let j=1;j<trails[i].length;j++)cx.lineTo(trails[i][j].x*cw,trails[i][j].y*H);cx.strokeStyle=col+'44';cx.lineWidth=1+sVel*6;cx.stroke();}
    const x=b.x*cw,y=b.y*H,r=20+sVel*100;
    const gr=cx.createRadialGradient(x,y,0,x,y,r);gr.addColorStop(0,col+'22');gr.addColorStop(1,col+'00');
    cx.fillStyle=gr;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
    cx.fillStyle=col+'88';cx.beginPath();cx.arc(x,y,2+b.sz,0,Math.PI*2);cx.fill();});
  if(pose&&G.dbg){const lm=pose.lm;[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]].forEach(([a,b])=>{cx.beginPath();cx.moveTo(lm[a].x*cw,lm[a].y*H);cx.lineTo(lm[b].x*cw,lm[b].y*H);cx.strokeStyle=col+'33';cx.lineWidth=1;cx.stroke();});
    lm.forEach(l=>{cx.fillStyle=col+'55';cx.beginPath();cx.arc(l.x*cw,l.y*H,2,0,Math.PI*2);cx.fill();});}
  for(let i=blobs.length;i<trails.length;i++)trails[i]=[];
  if(G.dbg){cx.fillStyle='#222';cx.font='9px monospace';cx.fillText(`s:${gS().toFixed(1)} det:${SC[si].d} vel:${sVel.toFixed(4)}`,6,H-4);}
  fN++;if(now-fT>1000){$('nF').textContent=fN;fN=0;fT=now;}
  if(G.tPr<1)G.tPr=Math.min(1,G.tPr+16/G.trT);
}
function loop(now){requestAnimationFrame(loop);draw(now);}

// ─────── KEYS ───────
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='6')goSc(+e.key);
  if(e.key==='d'||e.key==='D'){G.dbg=!G.dbg;Z('mDb');}
  if(e.key==='m'||e.key==='M'){G.muted=!G.muted;Tone.Destination.mute=G.muted;}
  if(e.key==='l'||e.key==='L'){G.dark=!G.dark;Z('mL',!G.dark);Z('mD',G.dark);}
  if(e.key==='p'||e.key==='P'){G.mpOn=!G.mpOn;Z('mMp');if(G.mpOn&&!mpObj)loadMP();}
});

// ─────── START ───────
document.addEventListener('click',async()=>{
  if(ok)return;$('inf').textContent='Loading reverbs...';
  await Tone.start();await initAudio();ok=true;
  startLoops();startCam();goSc(0);
  $('inf').textContent='Running | 0-6:scenes D:debug M:mute L:mode P:pose';
},{once:true});
requestAnimationFrame(loop);
</script>
