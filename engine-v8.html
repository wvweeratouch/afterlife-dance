<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Afterlife Dance — Engine v8</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#ddd;font-family:system-ui;height:100vh;display:flex;flex-direction:column}
#bar{padding:8px 12px;background:#0a0a12;border-bottom:1px solid #1a1a2a;display:flex;gap:10px;align-items:center;font-size:11px;z-index:5;flex-wrap:wrap}
#bar label{color:#446}
#bar input[type=number]{width:44px;background:#111;border:1px solid #222;color:#aaa;padding:2px 4px;font-size:11px;border-radius:2px}
#bar input[type=range]{width:70px;height:3px;-webkit-appearance:none;background:#222;border:none;border-radius:2px}
#bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;background:#668;border-radius:50%;cursor:pointer}
.sb{padding:3px 8px;border:1px solid #333;border-radius:3px;background:#111;color:#888;cursor:pointer;font-size:10px;font-family:monospace}
.sb.on{background:#224;color:#8af;border-color:#448}
#scene-name{color:#8af;font-weight:bold;min-width:100px}
#energy-bar{width:60px;height:6px;background:#111;border-radius:3px;overflow:hidden}
#energy-fill{height:100%;background:#448;border-radius:3px;transition:width 3s}
canvas{flex:1}
#info{position:absolute;bottom:8px;left:12px;color:#335;font-size:11px}
</style>
<script src="https://unpkg.com/tone@14"></script>
</head><body>
<div id="bar">
  <label>BPM</label><input type="number" value="72" min="40" max="200" id="bpm">
  <label>Vol</label><input type="range" min="0" max="100" value="60" id="vol">
  <label>Echo</label><input type="range" min="0" max="100" value="40" id="echo">
  <span style="color:#333">|</span>
  <span class="sb" onclick="setScene(0)">0 Chant</span>
  <span class="sb" onclick="setScene(1)">1 Form</span>
  <span class="sb" onclick="setScene(2)">2 Binary</span>
  <span class="sb" onclick="setScene(3)">3 Formless</span>
  <span class="sb" onclick="setScene(4)">4 Nova</span>
  <span class="sb" onclick="setScene(5)">5 Collapse</span>
  <span class="sb" onclick="setScene(6)">6 Distribute</span>
  <span style="color:#333">|</span>
  <span id="scene-name">—</span>
  <div id="energy-bar"><div id="energy-fill" style="width:0%"></div></div>
</div>
<canvas id="c"></canvas>
<div id="info">Click to start. Keys 0-6 = scenes.</div>

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;function rz(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight}rz();onresize=rz;
let started=false;

// ============================================================
// SCENES — Henry's energy map
// ============================================================
// Background layers (pad+breath+chorus) are ALWAYS ON, same volume.
// What changes per scene: melody density, sparkle, kick, gibberish,
// counter melody, reverb wet, and interactive bells.
const SC=[
  // 0: Summoning Chanting — เรียกขวัญ
  { name:'Summoning',nameT:'เรียกขวัญ',energy:[0,2],
    melVol:-22, mel2Vol:-99, sparkleP:0, kickInt:'2n', melRest:0.5, revWet:0.4, gibberish:false },
  // 1: Star Formation — ขวัญ gathering
  { name:'Formation',nameT:'ขวัญ gathering',energy:[2,8],
    melVol:-14, mel2Vol:-18, sparkleP:0.15, kickInt:null, melRest:0.15, revWet:0.35, gibberish:false },
  // 2: Binary — หิง-ขวัญ
  { name:'Binary',nameT:'หิง-ขวัญ',energy:[8,5],
    melVol:-14, mel2Vol:-18, sparkleP:0.15, kickInt:null, melRest:0.2, revWet:0.35, gibberish:false },
  // 3: Formless — ร่างเสมือน
  { name:'Formless',nameT:'ร่างเสมือน',energy:[5,0],
    melVol:-99, mel2Vol:-99, sparkleP:0, kickInt:null, melRest:1, revWet:0.6, gibberish:true },
  // 4: Supernova — ขวัญหนี
  { name:'Supernova',nameT:'ขวัญหนี',energy:[0,10],
    melVol:-12, mel2Vol:-99, sparkleP:0.3, kickInt:'4n', melRest:0.05, revWet:0.2, gibberish:false },
  // 5: Collapse — ส่งขวัญขึ้นฟ้า
  { name:'Collapse',nameT:'ส่งขวัญขึ้นฟ้า',energy:[10,2],
    melVol:-14, mel2Vol:-99, sparkleP:0.1, kickInt:null, melRest:0.25, revWet:0.6, gibberish:false },
  // 6: Distribute — ความสัมพันธ์ต่างมิติ
  { name:'Distribute',nameT:'cyclical',energy:[2,99],
    melVol:-16, mel2Vol:-18, sparkleP:0.15, kickInt:'2n', melRest:0.35, revWet:0.4, gibberish:false },
];
let curScene=0;

// ============================================================
// AUDIO
// ============================================================
let rev,pad,mel,mel2,sparkle,kick,breathNoise,breathFilter,breathGain,breathLFO;
let gibNoise,gibF1,gibF2,gibGain,gibLoop=null,kickLoop=null;

async function initAudio(){
  rev=new Tone.Reverb(6);rev.toDestination();await rev.ready;
  const chorus=new Tone.Chorus({frequency:0.2,delayTime:3.5,depth:0.6,wet:0.2});chorus.connect(rev);
  const dly1=new Tone.FeedbackDelay({delayTime:'8n.',feedback:0.2,wet:0.25});dly1.connect(rev);
  const dly2=new Tone.FeedbackDelay({delayTime:'4n',feedback:0.25,wet:0.3});dly2.connect(rev);

  // Pad — ALWAYS ON, constant volume
  pad=new Tone.PolySynth(Tone.FMSynth,{maxPolyphony:10,options:{
    harmonicity:1,modulationIndex:0.4,envelope:{attack:2.5,decay:1.5,sustain:0.8,release:4},
    modulation:{type:'sine'},oscillator:{type:'sine'}}});
  pad.volume.value=-18;pad.connect(chorus);

  // Melody — volume changes per scene
  mel=new Tone.FMSynth({harmonicity:3,modulationIndex:1,
    envelope:{attack:0.01,decay:0.4,sustain:0.25,release:1},
    modulation:{type:'triangle'},oscillator:{type:'sine'}});
  mel.volume.value=-14;mel.connect(dly1);

  // Counter melody
  mel2=new Tone.AMSynth({harmonicity:2,envelope:{attack:0.05,decay:0.6,sustain:0.15,release:1.5},
    oscillator:{type:'triangle'},modulation:{type:'sine'}});
  mel2.volume.value=-18;mel2.connect(dly2);

  // Sparkle
  sparkle=new Tone.MetalSynth({frequency:300,envelope:{attack:0.001,decay:1.5,release:1},
    harmonicity:5.1,modulationIndex:16,resonance:3000,octaves:1.5});
  sparkle.volume.value=-24;sparkle.connect(rev);

  // Kick (heartbeat)
  kick=new Tone.MembraneSynth({pitchDecay:0.05,octaves:4,
    envelope:{attack:0.001,decay:0.4,sustain:0,release:0.4}});
  kick.volume.value=-12;kick.connect(rev);

  // Breathing — ALWAYS ON, constant
  breathNoise=new Tone.Noise('pink');
  breathFilter=new Tone.Filter({frequency:800,type:'bandpass',Q:1.5});
  breathLFO=new Tone.LFO({frequency:0.15,min:0,max:0.2,type:'sine'});
  breathGain=new Tone.Gain(0.15);
  breathNoise.connect(breathFilter);breathFilter.connect(breathGain);
  breathGain.connect(rev);breathLFO.connect(breathGain.gain);
  breathNoise.start();breathLFO.start();

  // Gibberish (scene 3 only)
  gibNoise=new Tone.Noise('pink');
  gibF1=new Tone.Filter({frequency:270,type:'bandpass',Q:8});
  gibF2=new Tone.Filter({frequency:2300,type:'bandpass',Q:8});
  gibGain=new Tone.Gain(0);
  gibNoise.connect(gibF1);gibNoise.connect(gibF2);
  gibF1.connect(gibGain);gibF2.connect(gibGain);
  gibGain.connect(rev);gibNoise.start();
}

// ============================================================
// SCALES + NO-REPEAT WALK
// ============================================================
const CHORDS=[
  ['C2','G2','C3','E3','G3'],['A1','E2','A2','C3','E3'],
  ['F2','C3','F3','A3','C4'],['G2','D3','G3','B3','D4'],
  ['D2','A2','D3','F3','A3'],['E2','B2','E3','G3','B3'],
];
const MEL=['C4','D4','E4','G4','A4','C5','D5','E5','G5','A5'];
const MEL_HI=['E5','G5','A5','C6','D6','E6','G6','A6'];
const MEL2=['E3','G3','A3','C4','D4','E4','G4','A4'];
const VOWELS=[[270,2300],[730,1090],[300,870],[660,1720],[520,1190]];

let ci=0,mP=4,mD=1,m2P=3,m2D=-1;
let lastMelNote=-1,lastM2Note=-1;

// Walk that NEVER repeats the same note
function walk(p,d,sc){
  const old=p;
  for(let tries=0;tries<5;tries++){
    let np=p,nd=d;
    const r=Math.random();
    if(r<0.4)np+=nd;
    else if(r<0.6)np+=nd*2;
    else if(r<0.75){nd*=-1;np+=nd;}
    else np+=Math.floor(Math.random()*3)-1;
    if(np>=sc.length){np=sc.length-2;nd=-1;}
    if(np<0){np=1;nd=1;}
    if(np!==old)return[np,nd,true];
  }
  // Fallback: just move one step
  const np=p+d;
  if(np>=sc.length)return[sc.length-2,-1,true];
  if(np<0)return[1,1,true];
  return[np,d,true];
}

// ============================================================
// MUSIC LOOPS
// ============================================================
function startMusic(){
  Tone.Transport.bpm.value=72;
  Tone.Transport.swing=0.05;

  // Pad — constant, always plays
  new Tone.Loop(t=>{
    try{
      pad.releaseAll(t);
      const ch=CHORDS[ci%CHORDS.length];
      ch.forEach((n,i)=>pad.triggerAttack(n,t+i*0.03,0.2+Math.random()*0.15));
      ci++;
    }catch(e){}
  },'2m').start(0);

  // Melody — density controlled by scene.melRest
  new Tone.Loop(t=>{
    try{
      const s=SC[curScene];
      if(Math.random()<s.melRest)return;
      const scale=(s.revWet>0.5)?MEL_HI:MEL;
      const[p,d]=walk(mP,mD,scale);mP=p;mD=d;
      const durs=['8n','8n.','4n','4n.','2n'];
      mel.triggerAttackRelease(scale[mP],durs[Math.floor(Math.random()*durs.length)],t,0.12+Math.random()*0.3);
    }catch(e){}
  },'4n').start(0);

  // Counter melody
  new Tone.Loop(t=>{
    try{
      if(Math.random()>0.6)return;
      const[p,d]=walk(m2P,m2D,MEL2);m2P=p;m2D=d;
      const durs=['4n','4n.','2n','1m'];
      mel2.triggerAttackRelease(MEL2[m2P],durs[Math.floor(Math.random()*durs.length)],t,0.1+Math.random()*0.2);
    }catch(e){}
  },'2n').start('8n');

  // Sparkle
  new Tone.Loop(t=>{
    try{
      if(Math.random()<SC[curScene].sparkleP)
        sparkle.triggerAttackRelease('32n',t,0.05+Math.random()*0.15);
    }catch(e){}
  },'4n').start('16n');

  Tone.Transport.start();
}

// ============================================================
// SCENE SWITCHING
// ============================================================
function setScene(n){
  if(!started)return;
  curScene=n;
  const s=SC[n];

  // Update volumes (3s ramp)
  mel.volume.rampTo(s.melVol,3);
  mel2.volume.rampTo(s.mel2Vol,3);
  rev.wet.rampTo(s.revWet,3);

  // Kick loop
  if(kickLoop){kickLoop.stop();kickLoop.dispose();kickLoop=null;}
  if(s.kickInt){
    kickLoop=new Tone.Loop(t=>{
      try{kick.triggerAttackRelease('C1','8n',t,0.3);}catch(e){}
    },s.kickInt);
    kickLoop.start();
  }

  // Gibberish
  if(s.gibberish){
    gibGain.gain.rampTo(0.15,2);
    if(!gibLoop){
      gibLoop=new Tone.Loop(t=>{
        const v=VOWELS[Math.floor(Math.random()*VOWELS.length)];
        gibF1.frequency.rampTo(v[0],0.1);gibF2.frequency.rampTo(v[1],0.1);
      },'8n');
      gibLoop.start();
    }
  }else{
    gibGain.gain.rampTo(0,2);
    if(gibLoop){gibLoop.stop();gibLoop.dispose();gibLoop=null;}
  }

  // UI
  document.getElementById('scene-name').textContent=`#${n} ${s.name} — ${s.nameT}`;
  document.getElementById('energy-fill').style.width=`${Math.max(s.energy[0],s.energy[1])*10}%`;
  document.querySelectorAll('.sb').forEach((el,i)=>el.classList.toggle('on',i===n));
}

// ============================================================
// CONTROLS
// ============================================================
document.getElementById('bpm').oninput=function(){
  if(started)Tone.Transport.bpm.rampTo(+this.value,0.5);};
document.getElementById('vol').oninput=function(){
  if(started)Tone.Destination.volume.rampTo(Tone.gainToDb(this.value/100),0.3);};
document.getElementById('echo').oninput=function(){
  if(started)rev.wet.rampTo(this.value/100,0.5);};
document.addEventListener('keydown',e=>{
  const n=parseInt(e.key);if(n>=0&&n<=6)setScene(n);
});

// ============================================================
// VISUALS — simple stars
// ============================================================
const stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+0.2,tw:Math.random()*0.015+0.003,a:Math.random()*6.28,br:0.2+Math.random()*0.4});

function draw(){
  cx.fillStyle='rgba(5,5,16,0.08)';cx.fillRect(0,0,W,H);
  stars.forEach(s=>{
    s.a+=s.tw;
    cx.fillStyle=`rgba(180,200,255,${Math.max(0,s.br+Math.sin(s.a)*0.2)})`;
    cx.beginPath();cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);cx.fill();
  });
}
function loop(){requestAnimationFrame(loop);draw();}

// ============================================================
// START
// ============================================================
document.addEventListener('click',async()=>{
  if(started)return;
  document.getElementById('info').textContent='Loading...';
  await Tone.start();
  await initAudio();
  started=true;
  startMusic();
  setScene(0);
  document.getElementById('info').textContent='Playing. Keys 0-6 = scenes.';
},{once:true});
requestAnimationFrame(loop);
</script>
</body></html>
