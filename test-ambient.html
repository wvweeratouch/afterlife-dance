<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Celestial Ambient v4</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#050510;color:#ddd;font-family:system-ui;overflow:hidden;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#info{position:absolute;bottom:10px;left:10px;color:#335;font-size:11px;z-index:5}
#ui{position:absolute;top:10px;left:10px;z-index:5;color:#446;font-size:11px;display:flex;gap:12px;align-items:center}
#ui label{color:#335}
#ui input{width:50px;background:#111;border:1px solid #222;color:#aaa;padding:2px 4px;font-size:11px;border-radius:2px}
#ui input[type=range]{width:80px;height:3px;-webkit-appearance:none;background:#222;border:none;border-radius:2px}
#ui input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;background:#668;border-radius:50%;cursor:pointer}
</style>
<script src="https://unpkg.com/tone@14"></script>
</head><body>
<canvas id="c"></canvas>
<div id="ui">
  <label>BPM</label><input type="number" value="72" min="40" max="200" oninput="setBpm(+this.value)">
  <label>Vol</label><input type="range" min="0" max="100" value="60" oninput="setVol(this.value)">
  <label>Blobs</label><span id="nB" style="color:#446">0</span>
  <label>Vel</label><span id="nV" style="color:#446">0</span>
</div>
<div id="info">Click to start</div>

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;function rz(){W=cv.width=innerWidth;H=cv.height=innerHeight}rz();onresize=rz;
let started=false;

function setBpm(v){if(started)Tone.Transport.bpm.rampTo(v,0.5);}
function setVol(v){if(started)Tone.Destination.volume.rampTo(Tone.gainToDb(v/100),0.3);}

// ============================================================
// AUDIO — completely separate from detection
// ============================================================
let rev,synth,mel,mel2,sparkle,iBell;

async function initAudio(){
  rev=new Tone.Reverb(6);rev.toDestination();await rev.ready;
  const chorus=new Tone.Chorus({frequency:0.2,delayTime:3.5,depth:0.6,wet:0.2});chorus.connect(rev);
  const delay=new Tone.FeedbackDelay({delayTime:'8n.',feedback:0.2,wet:0.25});delay.connect(rev);
  const delay2=new Tone.FeedbackDelay({delayTime:'4n',feedback:0.25,wet:0.3});delay2.connect(rev);
  const iDelay=new Tone.FeedbackDelay({delayTime:'8n',feedback:0.3,wet:0.35});iDelay.connect(rev);

  // Pad
  synth=new Tone.PolySynth(Tone.FMSynth,{maxPolyphony:10,options:{
    harmonicity:1,modulationIndex:0.4,envelope:{attack:2.5,decay:1.5,sustain:0.8,release:4},
    modulation:{type:'sine'},oscillator:{type:'sine'}}});
  synth.volume.value=-18;synth.connect(chorus);

  // Melody
  mel=new Tone.FMSynth({harmonicity:3,modulationIndex:1,
    envelope:{attack:0.01,decay:0.4,sustain:0.25,release:1},
    modulation:{type:'triangle'},oscillator:{type:'sine'}});
  mel.volume.value=-14;mel.connect(delay);

  // Counter melody
  mel2=new Tone.AMSynth({harmonicity:2,envelope:{attack:0.05,decay:0.6,sustain:0.15,release:1.5},
    oscillator:{type:'triangle'},modulation:{type:'sine'}});
  mel2.volume.value=-18;mel2.connect(delay2);

  // Sparkle
  sparkle=new Tone.MetalSynth({frequency:300,envelope:{attack:0.001,decay:1.5,release:1},
    harmonicity:5.1,modulationIndex:16,resonance:3000,octaves:1.5});
  sparkle.volume.value=-24;sparkle.connect(rev);

  // Interactive bell (polyphonic)
  iBell=new Tone.PolySynth(Tone.FMSynth,{maxPolyphony:8,options:{
    harmonicity:5.4,modulationIndex:6,envelope:{attack:0.001,decay:2.5,sustain:0,release:2},
    modulation:{type:'sine'},oscillator:{type:'sine'}}});
  iBell.volume.value=-10;iBell.connect(iDelay);
}

// ============================================================
// MUSIC
// ============================================================
const CHORDS=[
  ['C2','G2','C3','E3','G3'],['A1','E2','A2','C3','E3'],
  ['F2','C3','F3','A3','C4'],['G2','D3','G3','B3','D4'],
  ['D2','A2','D3','F3','A3'],['E2','B2','E3','G3','B3'],
];
const MEL=['C4','D4','E4','G4','A4','C5','D5','E5','G5','A5'];
const MEL2=['E3','G3','A3','C4','D4','E4','G4','A4'];
const BELLS=['C5','D5','E5','G5','A5','C6','D6','E6'];
let ci=0,mP=4,mD=1,m2P=3,m2D=-1;

function walk(p,d,sc){
  const r=Math.random();
  if(r<0.35)p+=d;else if(r<0.55)p+=d*2;else if(r<0.7){d*=-1;p+=d;}else if(r<0.85)return[p,d,false];
  else p+=Math.floor(Math.random()*3)-1;
  if(p>=sc.length){p=sc.length-2;d=-1;}if(p<0){p=1;d=1;}return[p,d,true];
}

function startMusic(){
  Tone.Transport.bpm.value=72;
  Tone.Transport.swing=0.05;

  new Tone.Loop(t=>{
    try{
      synth.releaseAll(t);
      const ch=CHORDS[ci%CHORDS.length];
      ch.forEach((n,i)=>synth.triggerAttack(n,t+i*0.03,0.2+Math.random()*0.25));
      ci++;
    }catch(e){}
  },'2m').start(0);

  new Tone.Loop(t=>{
    try{
      const[p,d,play]=walk(mP,mD,MEL);mP=p;mD=d;if(!play)return;
      const durs=['8n','8n.','4n','4n.','2n'];
      mel.triggerAttackRelease(MEL[mP],durs[Math.floor(Math.random()*durs.length)],t,0.12+Math.random()*0.35);
    }catch(e){}
  },'4n').start(0);

  new Tone.Loop(t=>{
    try{
      const[p,d,play]=walk(m2P,m2D,MEL2);m2P=p;m2D=d;
      if(!play||Math.random()>0.6)return;
      const durs=['4n','4n.','2n','1m'];
      mel2.triggerAttackRelease(MEL2[m2P],durs[Math.floor(Math.random()*durs.length)],t,0.1+Math.random()*0.25);
    }catch(e){}
  },'2n').start('8n');

  new Tone.Loop(t=>{
    try{if(Math.random()<0.15)sparkle.triggerAttackRelease('32n',t,0.05+Math.random()*0.2);}catch(e){}
  },'4n').start('16n');

  Tone.Transport.start();
}

// ============================================================
// CAMERA — runs on its own slow timer, NOT in rAF
// ============================================================
let video;
let blobs=[],prevBlobs=[],smoothVel=0;
const offCv=document.createElement('canvas');offCv.width=80;offCv.height=60; // even smaller
const offCx=offCv.getContext('2d',{willReadFrequently:true});

async function startCam(){
  try{
    const st=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240}}); // lower res camera
    video=document.createElement('video');video.srcObject=st;video.play();
    // Run detection on its own interval — NOT tied to rAF
    setInterval(detect,200); // 5fps — plenty for blob tracking, doesn't block audio
  }catch(e){console.warn('No cam',e);}
}

function detect(){
  if(!video||!video.videoWidth)return;
  prevBlobs=[...blobs];
  offCx.drawImage(video,0,0,80,60);
  const fd=offCx.getImageData(0,0,80,60);
  const pts=[];
  for(let y=0;y<60;y+=3)for(let x=0;x<80;x+=3){
    const i=(y*80+x)*4;
    const br=(fd.data[i]+fd.data[i+1]+fd.data[i+2])/3;
    if(br>90)pts.push({x:x/80,y:y/60,br:br/255});
  }
  const cl=[],u=new Set();
  for(let i=0;i<pts.length;i++){
    if(u.has(i))continue;let cx=pts[i].x,cy=pts[i].y,cb=pts[i].br,n=1;u.add(i);
    for(let j=i+1;j<pts.length;j++){if(u.has(j))continue;
      if(Math.abs(pts[j].x-cx/n)<0.1&&Math.abs(pts[j].y-cy/n)<0.1){cx+=pts[j].x;cy+=pts[j].y;cb=Math.max(cb,pts[j].br);n++;u.add(j);}}
    cl.push({x:cx/n,y:cy/n,br:cb,sz:n});
  }
  blobs=cl.sort((a,b)=>b.sz-a.sz).slice(0,8);

  let v=0,nm=Math.min(blobs.length,prevBlobs.length);
  for(let i=0;i<nm;i++)v+=Math.sqrt((blobs[i].x-prevBlobs[i].x)**2+(blobs[i].y-prevBlobs[i].y)**2);
  const vel=nm>0?v/nm:0;
  smoothVel=smoothVel*0.7+vel*0.3;

  document.getElementById('nB').textContent=blobs.length;
  document.getElementById('nV').textContent=smoothVel.toFixed(3);

  // Trigger sounds from detection — but through Tone.js scheduling, not raw
  triggerFromBlobs();
}

// ============================================================
// INTERACTIVE — called from detect(), not from rAF
// ============================================================
let lastBell=0;

function triggerFromBlobs(){
  if(!started||blobs.length===0)return;
  const now=performance.now();
  try{
    const b=blobs[0];
    const bv=prevBlobs[0]?Math.sqrt((b.x-prevBlobs[0].x)**2+(b.y-prevBlobs[0].y)**2):0;

    // Bell on movement
    if(bv>0.01&&now-lastBell>300){
      lastBell=now;
      const ni=Math.floor(b.y*(BELLS.length-1));
      iBell.triggerAttackRelease(BELLS[ni],'2n',undefined,0.1+Math.random()*0.35);
    }

    // Extra blobs = extra bells staggered
    for(let i=1;i<Math.min(blobs.length,4);i++){
      if(!prevBlobs[i])continue;
      const bvi=Math.sqrt((blobs[i].x-prevBlobs[i].x)**2+(blobs[i].y-prevBlobs[i].y)**2);
      if(bvi>0.012&&Math.random()<0.3){
        const ni=Math.floor(blobs[i].y*(BELLS.length-1));
        iBell.triggerAttackRelease(BELLS[ni],'4n',Tone.now()+i*0.15,0.06+Math.random()*0.15);
      }
    }
  }catch(e){console.warn('trigger:',e);}
}

// ============================================================
// VISUALS — rAF only does drawing, no detection, no audio
// ============================================================
const stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+0.2,tw:Math.random()*0.015+0.003,a:Math.random()*6.28,br:0.2+Math.random()*0.4});
const trails=[];

function draw(now){
  cx.fillStyle='rgba(5,5,16,0.1)';cx.fillRect(0,0,W,H);
  stars.forEach(s=>{s.a+=s.tw;cx.fillStyle=`rgba(180,200,255,${Math.max(0,s.br+Math.sin(s.a)*0.2)})`;cx.beginPath();cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);cx.fill();});
  blobs.forEach((b,i)=>{
    if(!trails[i])trails[i]=[];trails[i].push({x:b.x,y:b.y});if(trails[i].length>20)trails[i].shift();
    if(trails[i].length>2){cx.beginPath();cx.moveTo(trails[i][0].x*W,trails[i][0].y*H);
      for(let j=1;j<trails[i].length;j++)cx.lineTo(trails[i][j].x*W,trails[i][j].y*H);
      cx.strokeStyle=`rgba(100,150,255,${0.1+smoothVel*3})`;cx.lineWidth=1+smoothVel*8;cx.stroke();}
    const x=b.x*W,y=b.y*H,r=25+smoothVel*150;
    const gr=cx.createRadialGradient(x,y,0,x,y,r);gr.addColorStop(0,`rgba(120,160,255,${0.08+smoothVel*1.5})`);gr.addColorStop(1,'rgba(100,150,255,0)');
    cx.fillStyle=gr;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
    cx.fillStyle=`rgba(200,220,255,${0.4+b.br*0.4})`;cx.beginPath();cx.arc(x,y,2+b.sz,0,Math.PI*2);cx.fill();
  });
  for(let i=blobs.length;i<trails.length;i++)trails[i]=[];
}

function loop(now){requestAnimationFrame(loop);draw(now);}

// ============================================================
// START
// ============================================================
document.addEventListener('click',async()=>{
  if(started)return;
  document.getElementById('info').textContent='Loading...';
  await Tone.start();
  await initAudio();
  started=true;
  startMusic();
  startCam();
  document.getElementById('info').textContent='Playing. Move to add bells.';
},{once:true});
requestAnimationFrame(loop);
</script>
</body></html>
