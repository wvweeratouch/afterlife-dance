<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Generative Lam — แคน + พิณ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#ddd;font-family:system-ui;height:100vh;display:flex;flex-direction:column}
#bar{padding:8px 12px;background:#0a0a12;border-bottom:1px solid #1a1a2a;display:flex;gap:10px;align-items:center;font-size:11px;z-index:5;flex-wrap:wrap}
#bar label{color:#446}
#bar input[type=range]{width:60px;height:3px;-webkit-appearance:none;background:#222;border:none;border-radius:2px}
#bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;background:#668;border-radius:50%;cursor:pointer}
#bar input[type=number]{width:44px;background:#111;border:1px solid #222;color:#aaa;padding:2px 4px;font-size:11px;border-radius:2px}
.badge{display:inline-block;padding:2px 6px;background:#2a1a0a;border:1px solid #443;border-radius:3px;color:#a86;font-size:9px}
#params{position:absolute;bottom:8px;left:12px;right:12px;color:#446;font-size:10px;font-family:monospace}
canvas{flex:1}
#info{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#664;font-size:18px;cursor:pointer;z-index:5}
#info.hide{display:none}
</style>
<script src="https://unpkg.com/tone@14"></script>
</head><body>
<div id="bar">
  <span style="color:#a86;font-weight:bold">ลำเต้ย</span>
  <span class="badge">แคน + พิณ</span>
  <label>BPM</label><input type="number" value="96" min="40" max="200" id="bpm" oninput="if(ok)Tone.Transport.bpm.rampTo(+this.value,1)">
  <label>Khaen</label><input type="range" min="-30" max="10" value="4" id="khaenVol" oninput="if(ok)khaen.volume.rampTo(+this.value,0.3)">
  <label>Pin</label><input type="range" min="-30" max="10" value="6" id="pinVol" oninput="if(ok)pin.volume.rampTo(+this.value,0.3)">
  <label>Bass</label><input type="range" min="-30" max="10" value="0" id="bassVol" oninput="if(ok)bass.volume.rampTo(+this.value,0.3)">
  <label>Pad</label><input type="range" min="-30" max="10" value="-6" id="padVol" oninput="if(ok)pad.volume.rampTo(+this.value,0.3)">
  <label>Drums</label><input type="range" min="-30" max="10" value="-4" id="drumVol">
  <label>Master</label><input type="range" min="-20" max="10" value="6" id="vol" oninput="if(ok)Tone.Destination.volume.rampTo(+this.value,0.3)">
</div>
<canvas id="c"></canvas>
<div id="info">Click to start ลำเต้ย (แคน + พิณ)</div>
<div id="params"></div>

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;function rz(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight}rz();onresize=rz;
let ok=false;

// ============================================================
// SCALE & CHORDS — from /jive analysis + khaen PDF
// PDF: 5 main notes: La Do Re Mi Sol (A C D E G) — pentatonic
// /jive: Key G, dominant notes G Bb C D
// Combined: G Bb C D F (pentatonic with b3 and b7 = Isan blues feel)
// ============================================================
const SCALE=[43,46,48,50,53,55,58,60,62,65,67,70,72,74]; // G2-D5
const PIN_SCALE=[55,58,60,62,65,67,70,72,74,77]; // G3-F5 (pin is higher register)
const BASS=[31,34,36,38,41,43]; // G1-G2

// Chord transitions (weighted, never repeat last)
const CH={
  G:{n:[43,55,62,67],next:{C:30,D:25,Bb:20,F:15,Am:10}},
  Bb:{n:[46,58,65,70],next:{F:30,C:25,G:20,D:15,Am:10}},
  C:{n:[48,60,67,72],next:{G:25,F:25,D:20,Bb:15,Am:15}},
  D:{n:[50,62,65,74],next:{G:30,C:20,F:20,Bb:15,Am:15}},
  F:{n:[41,53,60,65],next:{G:30,C:25,Bb:20,D:15,Am:10}},
  Am:{n:[45,57,64,69],next:{D:30,G:25,C:20,F:15,Bb:10}},
};
let curCh='G',lastCh='';
function nextCh(){const t=CH[curCh].next;const o=Object.entries(t).filter(([k])=>k!==lastCh);const s=o.reduce((a,[,w])=>a+w,0);let r=Math.random()*s;for(const[n,w] of o){r-=w;if(r<=0)return n;}return o[0][0];}

// Interval weights (NO repeat — interval 0 removed)
const IV=[{i:1,w:74},{i:-1,w:85},{i:2,w:62},{i:-2,w:57},{i:3,w:48},{i:-3,w:46}];
const IVT=IV.reduce((s,x)=>s+x.w,0);
function pickIV(){let r=Math.random()*IVT;for(const x of IV){r-=x.w;if(r<=0)return x.i;}return 1;}

// ============================================================
// AUDIO
// ============================================================
let rev,dly1,dly2,khaen,pin,bass,pad,kick,snare,hat;

async function initAudio(){
  Tone.Destination.volume.value=+document.getElementById('vol').value;
  rev=new Tone.Reverb(2.5);rev.toDestination();await rev.ready;
  dly1=new Tone.FeedbackDelay({delayTime:'8n.',feedback:0.12,wet:0.15});dly1.connect(rev);
  dly2=new Tone.FeedbackDelay({delayTime:'4n',feedback:0.15,wet:0.2});dly2.connect(rev);

  // ── KHAEN: legato mono synth ──
  // PDF insight: ลม ลิ้น นิ้ว (breath, tongue, fingers) = continuous sound
  // Key: portamento (glide) between notes = legato feel, not separate attacks
  khaen=new Tone.MonoSynth({
    oscillator:{type:'sawtooth'},
    filter:{type:'bandpass',frequency:1200,Q:2},
    filterEnvelope:{attack:0.01,decay:0.1,sustain:0.8,release:0.3,baseFrequency:800,octaves:1.5},
    envelope:{attack:0.01,decay:0.1,sustain:0.9,release:0.15},
    portamento:0.03, // GLIDE between notes — legato connected sound
  });
  khaen.volume.value=+document.getElementById('khaenVol').value;
  khaen.connect(dly1);khaen.toDestination();

  // ── PIN: plucked string synth (inspired by physical modeling PDF) ──
  // FMSynth with sharp attack + fast decay = pluck character
  // More audible than PluckSynth, better control
  pin=new Tone.FMSynth({
    harmonicity:3.5,modulationIndex:8,
    envelope:{attack:0.001,decay:0.8,sustain:0.05,release:1.2},
    modulation:{type:'triangle'},
    oscillator:{type:'triangle'},
  });
  pin.volume.value=+document.getElementById('pinVol').value;
  pin.connect(dly2);
  pin.toDestination();

  // ── BASS ──
  bass=new Tone.MonoSynth({
    oscillator:{type:'sine'},
    envelope:{attack:0.02,decay:0.3,sustain:0.5,release:0.3},
    filterEnvelope:{attack:0.02,decay:0.2,sustain:0.5,release:0.3,baseFrequency:200,octaves:1},
  });
  bass.volume.value=+document.getElementById('bassVol').value;
  bass.connect(rev);

  // ── PAD ──
  pad=new Tone.PolySynth(Tone.FMSynth,{maxPolyphony:8,options:{
    harmonicity:1,modulationIndex:0.3,
    envelope:{attack:2,decay:1,sustain:0.7,release:3},
    modulation:{type:'sine'},oscillator:{type:'sine'}
  }});
  pad.volume.value=+document.getElementById('padVol').value;
  pad.connect(rev);

  // ── DRUMS ──
  kick=new Tone.MembraneSynth({pitchDecay:0.05,octaves:5,
    envelope:{attack:0.001,decay:0.25,sustain:0,release:0.2}});
  kick.volume.value=0;kick.connect(rev);

  snare=new Tone.NoiseSynth({noise:{type:'white'},
    envelope:{attack:0.001,decay:0.12,sustain:0,release:0.08}});
  snare.volume.value=-6;snare.connect(rev);

  hat=new Tone.MetalSynth({frequency:400,
    envelope:{attack:0.001,decay:0.05,release:0.02},
    harmonicity:5,modulationIndex:20,resonance:6000,octaves:1});
  hat.volume.value=-14;hat.connect(rev);
}

// ============================================================
// GENERATIVE ENGINE
// ============================================================
let kP=6, pP=3, bP=2;
let noteVis=[];
let khaenIsPlaying=false;

function startGen(){
  Tone.Transport.bpm.value=96;
  Tone.Transport.swing=0.06;

  // ── KHAEN MELODY ──
  let lastK=-1, breathCounter=0;
  new Tone.Loop(t=>{
    // Check if khaen is muted
    if(+document.getElementById('khaenVol').value<=-25){
      if(khaenIsPlaying){khaen.triggerRelease(t);khaenIsPlaying=false;}
      return;
    }
    breathCounter++;

    // Breath pause every 6-12 notes (like real khaen breathing)
    if(breathCounter>6+Math.floor(Math.random()*7)){
      breathCounter=0;
      if(khaenIsPlaying){khaen.triggerRelease(t);khaenIsPlaying=false;}
      return; // silence = breath
    }

    let np=kP+pickIV();
    np=((np%SCALE.length)+SCALE.length)%SCALE.length;
    if(SCALE[np]===lastK)np=(np+1)%SCALE.length;
    kP=np;lastK=SCALE[kP];

    const freq=Tone.Midi(SCALE[kP]).toFrequency();
    // Legato: just change pitch, don't re-attack (MonoSynth glides)
    if(!khaenIsPlaying){
      khaen.triggerAttack(freq,t,0.7);
      khaenIsPlaying=true;
    }else{
      khaen.setNote(freq,t); // smooth pitch change, no re-attack
    }
    noteVis.push({note:SCALE[kP],t:Tone.now(),line:0});
  },'8n').start(0);

  // ── PIN MELODY (plucked, polyrhythmic against khaen) ──
  let lastP=-1;
  new Tone.Loop(t=>{
    if(+document.getElementById('pinVol').value<=-25)return;
    if(Math.random()>0.8)return;

    let np=pP+(Math.random()<0.5?1:-1)*(1+Math.floor(Math.random()*2));
    np=((np%PIN_SCALE.length)+PIN_SCALE.length)%PIN_SCALE.length;
    if(PIN_SCALE[np]===lastP)np=(np+1)%PIN_SCALE.length;
    pP=np;lastP=PIN_SCALE[pP];

    pin.triggerAttackRelease(Tone.Midi(PIN_SCALE[pP]).toFrequency(),'4n',t,0.6+Math.random()*0.3);
    noteVis.push({note:PIN_SCALE[pP],t:Tone.now(),line:1});
  },'4n.').start('4n');

  // ── BASS ──
  let lastB=-1;
  new Tone.Loop(t=>{
    let nb=bP+(Math.random()<0.6?0:(Math.random()<0.5?1:-1));
    nb=((nb%BASS.length)+BASS.length)%BASS.length;
    if(BASS[nb]===lastB)nb=(nb+1)%BASS.length;
    bP=nb;lastB=BASS[bP];
    bass.triggerAttackRelease(Tone.Midi(BASS[bP]).toFrequency(),'2n',t,0.7);
    noteVis.push({note:BASS[bP],t:Tone.now(),line:2});
  },'2n').start(0);

  // ── PAD (random chord transitions) ──
  new Tone.Loop(t=>{
    pad.releaseAll(t);
    lastCh=curCh;curCh=nextCh();
    CH[curCh].n.forEach((n,i)=>
      pad.triggerAttack(Tone.Midi(n).toFrequency(),t+i*0.03,0.25));
  },'2m').start(0);

  // ── DRUMS — PATTERN based, not metronome ──
  // Isan groove: asymmetric, syncopated, human feel
  const dv=()=>{const v=+document.getElementById('drumVol').value;return v<-25?0:Math.pow(10,v/20);};

  // Drum patterns — cycle through variations (not just steady beat)
  const KICK_PATTERNS=[
    [1,0,0,1,0,0,1,0], // basic
    [1,0,0,1,0,1,0,0], // syncopated
    [1,0,1,0,0,1,0,0], // double
    [1,0,0,0,1,0,1,0], // sparse
    [1,0,0,1,1,0,0,1], // busy
  ];
  const SNARE_PATTERNS=[
    [0,0,1,0,0,0,1,0], // 2&4
    [0,0,1,0,0,1,0,0], // shifted
    [0,0,1,0,0,0,1,1], // fill end
    [0,1,0,0,1,0,0,0], // offbeat
  ];
  const HAT_PATTERNS=[
    [1,1,1,1,1,1,1,1], // straight 8ths
    [1,0,1,1,0,1,1,0], // syncopated
    [1,1,0,1,1,0,1,0], // broken
    [1,0,1,0,1,0,1,1], // sparse + fill
  ];

  let drumBar=0,kickPat=0,snarePat=0,hatPat=0,stepInBar=0;

  // Change pattern every 4 bars
  new Tone.Loop(t=>{
    drumBar++;
    if(drumBar%4===0){
      kickPat=Math.floor(Math.random()*KICK_PATTERNS.length);
      snarePat=Math.floor(Math.random()*SNARE_PATTERNS.length);
      hatPat=Math.floor(Math.random()*HAT_PATTERNS.length);
    }
  },'1m').start(0);

  // Step sequencer on 8th notes
  new Tone.Loop(t=>{
    const v=dv();if(v<0.01)return;
    const step=stepInBar%8;

    if(KICK_PATTERNS[kickPat][step])
      kick.triggerAttackRelease('G1','16n',t,0.45*v+Math.random()*0.1*v);

    if(SNARE_PATTERNS[snarePat][step])
      snare.triggerAttackRelease('8n',t,0.3*v+Math.random()*0.1*v);

    // Hat — with velocity variation (accent on downbeats)
    if(HAT_PATTERNS[hatPat][step]){
      const accent=step===0||step===4?0.15:0.06;
      hat.triggerAttackRelease('32n',t,(accent+Math.random()*0.04)*v);
    }

    // Ghost notes — random quiet hits for human feel
    if(Math.random()<0.1)
      snare.triggerAttackRelease('32n',t+0.02,0.05*v);

    stepInBar++;
  },'8n').start(0);

  // Fill every 4 bars
  new Tone.Loop(t=>{
    const v=dv();if(v<0.01)return;
    const len=2+Math.floor(Math.random()*4);
    for(let i=0;i<len;i++){
      const dt=i*0.06;
      if(Math.random()<0.4)snare.triggerAttackRelease('16n',t+dt,0.25*v);
      else kick.triggerAttackRelease('A1','16n',t+dt,0.3*v);
    }
  },'4m').start('4m.-2n');

  Tone.Transport.start();
}

// ============================================================
// VISUALS
// ============================================================
const COLS=['#a86','#6a8','#48a','#686','#888'];
const NAMES=['Khaen','Pin','Bass','Pad','Drums'];
function draw(){
  cx.fillStyle='rgba(5,5,16,0.05)';cx.fillRect(0,0,W,H);
  const now=Tone.now();
  noteVis=noteVis.filter(n=>now-n.t<4);
  noteVis.forEach(n=>{
    const age=now-n.t,alpha=Math.max(0,1-age/4);
    const x=W-(age/4)*W,y=H-(n.note-25)/(85-25)*H;
    cx.globalAlpha=alpha;cx.fillStyle=COLS[n.line];
    cx.beginPath();cx.arc(x,y,n.line===2?4:3,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;cx.font='10px monospace';
  NAMES.forEach((s,i)=>{cx.fillStyle=COLS[i];cx.fillText(s,W-70,20+i*14);});
}
function loop(){requestAnimationFrame(loop);draw();}

function showP(){
  document.getElementById('params').textContent=
    `BPM:${document.getElementById('bpm').value} Key:G Chord:${curCh} | `+
    `Khaen:legato(portamento) Pin:pluck(Karplus-Strong) | Source: /jive + PDF analysis`;
  requestAnimationFrame(showP);
}

// ============================================================
// START
// ============================================================
document.getElementById('info').addEventListener('click',async()=>{
  document.getElementById('info').classList.add('hide');
  await Tone.start();await initAudio();ok=true;
  startGen();showP();
},{once:true});
requestAnimationFrame(loop);
</script>
</body></html>
